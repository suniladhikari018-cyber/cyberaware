name: CyberAware CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Stage 1: Build ────────────────────────────────────────────────────────────
  build:
    name: Build & Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety pytest

  # ── Stage 2: SAST (Static Analysis) ──────────────────────────────────────────
  sast:
    name: Security Scan (SAST - Bandit)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit
      - name: Run Bandit SAST
        run: bandit -r src/ -f json -o bandit-report.json || true
      - name: Display Bandit Results
        run: cat bandit-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Stage 3: Dependency Scan ──────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan (Safety)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install safety
      - name: Run Safety Check
        run: safety check -r requirements.txt || true

  # ── Stage 4: Tests ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run Tests
        run: cd tests && pytest -v || true

  # ── Stage 5: Deploy (placeholder) ────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy notification
        run: echo "✅ Deployment to staging would happen here."
