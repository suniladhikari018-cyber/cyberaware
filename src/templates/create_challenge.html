{% extends "base.html" %}
{% block title %}Create Challenge – CyberAware{% endblock %}
{% block content %}

<div class="mb-6">
  <a href="{{ url_for('admin') }}" class="text-sm text-cyan-600 hover:underline">← Back to Admin</a>
  <h1 class="text-2xl font-bold text-gray-800 mt-2">➕ Create New Challenge</h1>
</div>

<div class="bg-white rounded-2xl shadow-lg p-6">
  <form method="POST">

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
        <input type="text" name="title" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
        <input type="text" name="category" required placeholder="e.g. Phishing, Password, Social Engineering"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"/>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Difficulty</label>
        <select name="difficulty"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Points</label>
        <input type="number" name="points" value="20" min="5" max="100"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"/>
      </div>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Scenario / Question *</label>
      <textarea name="description" required rows="4" placeholder="Describe the scenario or question..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"></textarea>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-2">Answer Options * <span class="text-gray-400 font-normal">(mark the correct one)</span></label>
      <div class="space-y-2">
        {% for i in range(4) %}
        <div class="flex items-center gap-3">
          <input type="radio" name="correct_index" value="{{ i }}" {% if i == 0 %}required{% endif %}
            class="w-4 h-4 text-cyan-600 accent-cyan-600"/>
          <input type="text" name="opt{{ i }}" required placeholder="Option {{ i + 1 }}"
            class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"/>
        </div>
        {% endfor %}
      </div>
      <p class="text-xs text-gray-400 mt-1">Select the radio button next to the correct answer.</p>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Explanation *</label>
      <textarea name="explanation" required rows="3" placeholder="Explain why the correct answer is right..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"></textarea>
    </div>

    <div class="flex gap-3">
      <button type="submit"
        class="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white font-semibold py-2 rounded-lg transition">
        Create Challenge
      </button>
      <a href="{{ url_for('admin') }}"
        class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 rounded-lg transition">
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
