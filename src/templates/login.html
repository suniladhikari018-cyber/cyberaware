{% extends "base.html" %}
{% block title %}Login – CyberAware{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-6">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <div class="text-5xl mb-2">🛡️</div>
      <h1 class="text-2xl font-bold text-gray-800">CyberAware</h1>
      <p class="text-gray-500 text-sm mt-1">Cybersecurity Awareness Training</p>
    </div>

    <form method="POST">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"/>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500"/>
      </div>
      <button type="submit"
        class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-semibold py-2 rounded-lg transition">
        Login
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="text-cyan-600 hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
