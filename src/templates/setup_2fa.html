{% extends "base.html" %}
{% block title %}Setup 2FA – CyberAware{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-6">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md text-center">
    <div class="text-4xl mb-3">📱</div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Setup Two-Factor Authentication</h1>
    <p class="text-gray-500 text-sm mb-6">
      Scan this QR code with <strong>Google Authenticator</strong> or <strong>Authy</strong>.
    </p>

    <div class="flex justify-center mb-4">
      <img src="data:image/png;base64,{{ qr_b64 }}" alt="2FA QR Code"
           class="border-4 border-gray-200 rounded-xl" style="width:200px;height:200px"/>
    </div>

    <p class="text-xs text-gray-400 mb-2">Can't scan? Enter this code manually:</p>
    <code class="bg-gray-100 px-3 py-1 rounded text-sm font-mono text-gray-700">{{ secret }}</code>

    <div class="mt-6">
      <a href="{{ url_for('login') }}"
         class="inline-block bg-cyan-600 hover:bg-cyan-700 text-white font-semibold px-6 py-2 rounded-lg transition">
        Continue to Login
      </a>
    </div>
  </div>
</div>
{% endblock %}
