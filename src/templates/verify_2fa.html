{% extends "base.html" %}
{% block title %}Verify 2FA – CyberAware{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-6">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm text-center">
    <div class="text-4xl mb-3">🔐</div>
    <h1 class="text-xl font-bold text-gray-800 mb-1">Two-Factor Authentication</h1>
    <p class="text-gray-500 text-sm mb-6">Hi <strong>{{ username }}</strong>, enter your 6-digit code.</p>

    <form method="POST">
      <input type="text" name="token" maxlength="6" pattern="\d{6}" required autofocus
        placeholder="000000"
        class="w-full border-2 border-gray-300 rounded-xl px-4 py-3 text-center text-2xl font-mono tracking-widest focus:outline-none focus:border-cyan-500 mb-4"/>
      <button type="submit"
        class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-semibold py-2 rounded-lg transition">
        Verify
      </button>
    </form>

    <p class="text-xs text-gray-400 mt-4">
      <a href="{{ url_for('login') }}" class="hover:underline">← Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
